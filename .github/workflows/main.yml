name: Run Python Crawler Automatically

on:
  schedule:
    # -------------------------------------------------------------------------
    # [핵심] 크롤러를 자동으로 실행할 시간을 '정시' 기준으로 설정합니다.
    # UTC 표준시를 사용하므로, 한국 시간(KST)에서 9시간을 빼서 계산해야 합니다.
    # 예: 매일 새벽 3시 실행 원함 -> 3시 - 9시간 = 전날 18시 -> '0 18 * * *'
    # 예: 6시간마다 실행 원함 -> '0 */6 * * *'
    # -------------------------------------------------------------------------
    - cron: '0 18 * * *' 
  workflow_dispatch: # 이 한 줄이 있으면 깃허브 웹사이트에서 내가 원할 때 수동으로 바로 실행할 수도 있습니다.

jobs:
  crawl:
    runs-on: ubuntu-latest # 가상의 리눅스 컴퓨터를 대여합니다.

    steps:
    - name: 1. 저장소의 코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. 가상 컴퓨터에 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'

    - name: 3. 크롬 브라우저 설정 (Selenium 구동용)
      # 깃허브 Actions의 기본 우분투 환경에는 크롬과 크롬드라이버가 이미 설치되어 있어, 
      # 별도의 다운로드 없이 headless 옵션만 주면 바로 작동합니다.
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 4. 필요한 라이브러리 설치 (requirements.txt)
      run: |
        python -m pip upgrade pip
        pip install -r requirements.txt

    - name: 5. 파이썬 스크립트 실행
      run: |
        python main.py
